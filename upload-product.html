<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Producto - Re-Sale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
        }

        .form-container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { font-size: 1.8rem; margin-bottom: 30px; text-align: center; }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Simulador de Subida de Fotos */
        .upload-area {
            border: 2px dashed #cbd5e1;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover { background: #f8fafc; border-color: var(--primary); }

        /* Icono de Ubicación (Google Maps Simulado) */
        .location-input-wrapper {
            position: relative;
        }

        .location-input-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #ef4444;
        }

        .location-input { padding-left: 40px !important; }

        .btn-publish {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 20px;
        }

        .btn-publish:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        .btn-publish:active { transform: scale(0.98); }

    </style>
</head>
<body>

<div class="form-container">
    <h1>Vender un artículo</h1>
    
    <div class="form-group">
        <label>Fotos del producto</label>
        <div class="upload-area">
            <span style="font-size: 2rem;">📸</span>
            <p style="margin: 10px 0 0; color: #64748b;">Arrastra tus fotos aquí o haz clic para buscar</p>
        </div>
    </div>

    <div class="form-group">
        <label for="titulo">¿Qué vendes?</label>
        <input type="text" id="titulo" placeholder="Ej: Nintendo Switch seminueva">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="form-group">
            <label for="categoria">Categoría</label>
            <select id="categoria">
                <option>Tecnología</option>
                <option>Ropa</option>
                <option>Hogar</option>
                <option>Otros</option>
            </select>
        </div>
        <div class="form-group">
            <label for="precio">Precio ($)</label>
            <input type="number" id="precio" placeholder="0.00">
        </div>
    </div>

    <div class="form-group">
        <label for="ubicacion">Ubicación de entrega</label>
        <div class="location-input-wrapper">
            <i>📍</i>
            <input type="text" class="location-input" placeholder="Busca tu colonia o ciudad (Google Maps)...">
        </div>
        <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 5px;">Esto ayudará a que compradores cerca de ti encuentren tu producto.</p>
    </div>

    <div class="form-group">
        <label for="desc">Descripción</label>
        <textarea id="desc" rows="4" placeholder="Cuéntanos más sobre el estado del producto..."></textarea>
    </div>

    <button class="btn-publish">Publicar Ahora</button>
</div>

</body>
</html>
