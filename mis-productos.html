<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Productos - Panel de Vendedor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
        }

        /* Sidebar simple */
        .sidebar {
            width: 240px;
            background: #1e293b;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .main-content {
            flex: 1;
            padding: 40px;
        }

        /* Cabecera del Panel */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-new {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-new:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* Tabla de Productos */
        .products-table {
            width: 100%;
            background: white;
            border-radius: 15px;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .products-table th, .products-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }

        .products-table th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .product-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-img-mini {
            width: 50px;
            height: 50px;
            background: #e2e8f0;
            border-radius: 8px;
        }

        /* Etiquetas de Estado */
        .status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .status-active { background: #dcfce7; color: #166534; }
        .status-paused { background: #fef3c7; color: #92400e; }

        /* Botones de Acción */
        .actions { display: flex; gap: 10px; }
        .btn-action {
            border: none;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-edit { background: #f1f5f9; color: var(--text); }
        .btn-delete { background: #fee2e2; color: var(--danger); }
        .btn-edit:hover { background: #e2e8f0; }
        .btn-delete:hover { background: #fecaca; }

    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--primary)">Le pulge</h2>
    <p style="opacity: 0.6; font-size: 0.9rem;">Panel de Vendedor</p>
    <nav style="margin-top: 40px;">
        <div style="margin-bottom: 20px; font-weight: 600;">📦 Mis Productos</div>
        <div style="margin-bottom: 20px; opacity: 0.6;">💬 Mensajes</div>
        <div style="margin-bottom: 20px; opacity: 0.6;">⚙️ Configuración</div>
    </nav>
</div>

<div class="main-content">
    <div class="panel-header">
        <h1>Mis Productos subidos</h1>
        <a href="upload-product.html" class="btn-new">+ Subir nuevo producto</a>
    </div>

    <table class="products-table">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <div class="product-info">
                        <div class="product-img-mini"></div>
                        <div>
                            <div style="font-weight: 600;">iPhone 13 Pro</div>
                            <div style="font-size: 0.8rem; color: #64748b;">Subido hace 2 días</div>
                        </div>
                    </div>
                </td>
                <td>Tecnología</td>
                <td><strong>$12,500</strong></td>
                <td><span class="status status-active">Activo</span></td>
                <td class="actions">
                    <button class="btn-action btn-edit" title="Editar">✏️</button>
                    <button class="btn-action btn-delete" title="Eliminar">🗑️</button>
                </td>
            </tr>
            <tr>
                <td>
                    <div class="product-info">
                        <div class="product-img-mini"></div>
                        <div>
                            <div style="font-weight: 600;">Chaqueta de Cuero</div>
                            <div style="font-size: 0.8rem; color: #64748b;">Subido hace 1 semana</div>
                        </div>
                    </div>
                </td>
                <td>Ropa</td>
                <td><strong>$850</strong></td>
                <td><span class="status status-paused">Pausado</span></td>
                <td class="actions">
                    <button class="btn-action btn-edit" title="Editar">✏️</button>
                    <button class="btn-action btn-delete" title="Eliminar">🗑️</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
