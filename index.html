<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Le Pulge | Marketplace Local</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        html,
        body {
            max-width: 100%;
            overflow-x: hidden;
            /* Elimina el scroll horizontal molesto */
        }

        .container,
        .container-fluid {
            padding-right: 15px;
            padding-left: 15px;
        }

        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 70px;
            /* Espacio para menú móvil */
        }

        .navbar-brand {
            font-weight: 800;
            color: var(--primary) !important;
            font-size: 1.5rem;
        }

        /* Filtros Sticky */
        .filters-sidebar {
            position: sticky;
            top: 80px;
            height: fit-content;
        }

        /* Tarjetas estilo Le Pulge */
        .product-card {
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: white;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }

        .card-img-sim {
            width: 100%;
            height: 180px;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            border-radius: 15px 15px 0 0;
        }

        .price {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.2rem;
        }

        /* Menú Inferior Móvil */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #dee2e6;
            z-index: 1050;
        }

        .mobile-nav a {
            text-decoration: none;
            color: #64748b;
            font-size: 0.7rem;
            text-align: center;
        }

        .mobile-nav a.active {
            color: var(--primary);
        }

        .mobile-nav i {
            font-size: 1.4rem;
            display: block;
        }

        @media (min-width: 768px) {
            .mobile-nav {
                display: none;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm sticky-top d-none d-md-block">
        <div class="container">
            <a class="navbar-brand" href="index.html">Le pulge</a>
            <div class="d-flex align-items-center">
                <div class="me-4">
                    <a href="index.html" class="text-dark text-decoration-none me-3 fw-semibold">Catálogo</a>
                    <a href="mis-productos.html" class="text-dark text-decoration-none fw-semibold">Mis Productos</a>
                </div>
                <div class="input-group">
                    <input type="text" class="form-control rounded-start-pill" placeholder="¿Qué estás buscando?">
                    <button class="btn btn-primary rounded-end-pill px-4">Buscar</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">

            <aside class="col-lg-3 d-none d-lg-block">
                <div class="filters-sidebar bg-white p-4 rounded-4 shadow-sm">
                    <h5 class="fw-bold mb-3">Filtros</h5>

                    <div class="mb-4">
                        <p class="small fw-bold text-muted text-uppercase">Categorías</p>
                        <div class="form-check"><input class="form-check-input" type="checkbox">
                            <label>Tecnología</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox"> <label>Ropa</label>
                        </div>
                        <div class="form-check"><input class="form-check-input" type="checkbox"> <label>Hogar</label>
                        </div>
                        <div class="form-check"><input class="form-check-input" type="checkbox"> <label>Deportes</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <p class="small fw-bold text-muted text-uppercase">Precio Máximo</p>
                        <input type="range" class="form-range" min="0" max="10000">
                    </div>

                    <div class="mb-3">
                        <p class="small fw-bold text-muted text-uppercase">Ubicación</p>
                        <select class="form-select border-0 bg-light">
                            <option>Colima</option>
                            <option>Villa de Álvarez</option>
                            <option>Comala</option>
                            <option>Manzanillo</option>
                        </select>
                    </div>
                </div>
            </aside>

            <main class="col-lg-9">
                <div class="d-md-none mb-3">
                    <input type="text" class="form-control rounded-pill shadow-sm"
                        placeholder="🔍 Buscar en Le Pulge...">
                </div>

                <div class="row row-cols-2 row-cols-md-3 g-3">

                    <div class="col">
                        <a href="detalles-producto.html" class="product-card h-100">
                            <div class="card-img-sim">Foto de Producto</div>
                            <div class="p-3">
                                <h6 class="fw-bold mb-1 text-truncate">iPhone 13 Pro</h6>
                                <div class="price mb-1">$12,500</div>
                                <div class="small text-muted">📍 Colima, Col.</div>
                            </div>
                        </a>
                    </div>

                    <div class="col">
                        <a href="detalles-producto.html" class="product-card h-100">
                            <div class="card-img-sim">Foto de Producto</div>
                            <div class="p-3">
                                <h6 class="fw-bold mb-1 text-truncate">Cámara Canon EOS</h6>
                                <div class="price mb-1">$8,200</div>
                                <div class="small text-muted">📍 Villa de Álvarez</div>
                            </div>
                        </a>
                    </div>

                    <div class="col">
                        <a href="detalles-producto.html" class="product-card h-100">
                            <div class="card-img-sim">Foto de Producto</div>
                            <div class="p-3">
                                <h6 class="fw-bold mb-1 text-truncate">Silla Gamer Red</h6>
                                <div class="price mb-1">$2,100</div>
                                <div class="small text-muted">📍 Comala</div>
                            </div>
                        </a>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <nav class="mobile-nav shadow">
        <a href="index.html" class="active">
            <i class="bi bi-house-door-fill"></i>
            <span>Inicio</span>
        </a>
        <a href="#">
            <i class="bi bi-search"></i>
            <span>Explorar</span>
        </a>
        <a href="upload-product.html">
            <i class="bi bi-plus-circle-fill text-primary"></i>
            <span>Vender</span>
        </a>
        <a href="mis-productos.html">
            <i class="bi bi-box-seam"></i>
            <span>Mis Ventas</span>
        </a>
        <a href="#">
            <i class="bi bi-person"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
